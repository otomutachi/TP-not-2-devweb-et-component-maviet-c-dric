<div class="app-container">
  <header class="app-header">
    <h1>Dashboard Formateur - Maviet Cédric</h1>
    <p>Gestion de la présence des étudiants en distanciel a l unc</p>
  </header>

  <app-presenter 
    [presenter]="presenter$()"
    (closed)="onPresenterClosed()"
  ></app-presenter>

  <app-statistics [users]="users$()"></app-statistics>

  <div class="users-section">
    <h2>Liste des étudiants</h2>
    <div class="users-list">
      <app-user-card
        *ngFor="let user of users$()"
        [user]="user"
        [showButtons]="!(presenter$())"
        (presenceToggled)="onPresenceToggled($event)"
        (presenterSelected)="onPresenterSelected($event)"
      ></app-user-card>
    </div>
  </div>
</div>
