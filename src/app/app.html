<div class="app-container">
  <header class="app-header">
    <h1>👨‍🏫 Dashboard Formateur</h1>
    <p>Gestion de la présence des étudiants en distanciel</p>
  </header>

  <!-- Composant Présentateur -->
  <app-presenter></app-presenter>

  <!-- Section Statistiques -->
  <app-statistics></app-statistics>

  <!-- Section Liste des Utilisateurs -->
  <div class="users-section">
    <h2>Liste des étudiants</h2>
    <div class="users-list">
      <app-user-card
        *ngFor="let user of users$()"
        [user]="user"
        [showButtons]="!(presenter$())"
        (presenceToggled)="onPresenceToggled($event)"
        (presenterSelected)="onPresenterSelected($event)"
      ></app-user-card>
    </div>
  </div>
</div>
